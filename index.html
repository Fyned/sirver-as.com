<html lang="tr">

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1B5E20" />

    <meta property="og:type" content="website" />
    <meta property="og:locale" content="tr_TR" />

    <meta property="og:url" content="https://www.sirver-as.com/" />
    <meta property="og:title" content="Sirver A.Ş. | Endüstriyel Biyokütle ve Odun Cipsi Tedariği" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sirver A.Ş. | Endüstriyel Biyokütle ve Odun Cipsi" />
    <meta name="twitter:description" content="1.2 Milyon ton kapasite ile enerji sektörüne odun cipsi ve biyokütle tedariği." />

    <title>Sirver A.Ş. | Endüstriyel Biyokütle ve Odun Cipsi Tedariği</title>

    <!-- Critical CSS — ilk paint için gerekli minimum stiller -->
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0}
      html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
      body{font-family:'Manrope',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#ECEFF1;color:#1A1A1A}
      #root{display:flex;flex-direction:column;min-height:100vh}
      /* Loading screen — JS yüklenene kadar görünür */
      .initial-loader{position:fixed;inset:0;z-index:9999;background:#1A2332;display:flex;align-items:center;justify-content:center}
      .initial-loader::after{content:'';width:40px;height:40px;border:3px solid rgba(255,255,255,.1);border-top-color:#2E7D32;border-radius:50%;animation:spin .6s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
    </style>

    <!-- JSON-LD Organization Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Sirver A.Ş.",
      "url": "https://www.sirver-as.com",
      "logo": "https://www.sirver-as.com/favicon.png",
      "description": "Endüstriyel biyokütle ve odun cipsi tedariği. 1.2 milyon ton yıllık kapasite.",
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+90-530-923-50-33",
        "contactType": "sales",
        "areaServed": "TR",
        "availableLanguage": "Turkish"
      },
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Esmira Office Center No:1/49, Musalla Bağları, Gürsesler Sk.",
        "addressLocality": "Selçuklu",
        "addressRegion": "Konya",
        "postalCode": "42060",
        "addressCountry": "TR"
      },
      "sameAs": [
        "https://www.instagram.com/sirver_tarim/"
      ]
    }
    </script>
  </head>
  <body>
    <!-- Native loading indicator — React yüklenene kadar gösterilir -->
    <div id="root">
      <div class="initial-loader" id="native-loader"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // React render edince native loader'ı kaldır
      const observer = new MutationObserver(() => {
        const loader = document.getElementById('native-loader');
        if (loader && document.getElementById('root').children.length > 1) {
          loader.remove();
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
  </body>
</html>
